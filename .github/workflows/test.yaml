name: Build and test
on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Run every hour. This helps detect flakiness,
    # and broken external dependencies.
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rosdistro: [humble, jazzy, kilted, rolling]
      fail-fast: false
    container:
      image: ghcr.io/sloretz/ros:${{ matrix.rosdistro }}-ros-base
    steps:
      - name: Build Environment
        uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.rosdistro }}
      - name: Run Tests
        uses: ros-tooling/action-ros-ci@0.4.5
        with:
          package-name: bag2_to_image
          target-ros2-distro: ${{ matrix.rosdistro }}
      - name: Upload logs
        uses: actions/upload-artifact@v7
        with:
          name: colcon-logs-${{ matrix.rosdistro }}
          path: ros_ws/log
        if: always()
